name: Weekly Critical Pulse Automation

on:
  schedule:
    # 10:00 AM IST is 04:30 AM UTC
    - cron: '30 4 * * 1'
  workflow_dispatch: # Allows manual trigger from GitHub UI for testing

jobs:
  run-pulse-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Run Phase 1: Ingestion (Scrape & Clean)"
        run: |
          python phase_1_ingestion/scraper.py
          python phase_1_ingestion/cleaner.py

      - name: "Run Phase 2: Analysis & Generation"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python phase_2_analysis/analyzer.py

      - name: "Send Automated Weekly Email"
        env:
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: |
          python automation/send_weekly_email.py

      - name: Commit and Push Updated Pulse Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 [Automated] Weekly Pulse Update (Run #${{ github.run_id }})"
          file_pattern: 'data/weekly_pulse.json'
          commit_user_name: "Weekly Pulse Bot"
          commit_user_email: "actions@github.com"
          commit_author: "Pulse Butler <actions@github.com>"
